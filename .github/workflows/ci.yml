name: ci

'on':
  pull_request:
  push:
    branches:
      - "**"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.changes.outputs.web }}
      api: ${{ steps.changes.outputs.api }}
      infra: ${{ steps.changes.outputs.infra }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            web:
              - 'apps/web/**'
              - '.github/workflows/ci.yml'
            api:
              - 'apps/api/**'
              - '.github/workflows/ci.yml'
            infra:
              - 'infra/**'
              - '.github/workflows/ci.yml'

  infra-checks:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.infra == 'true' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        working-directory: infra/providers/aws/terraform
        run: terraform fmt -check -recursive
      - name: Terraform init (backend disabled)
        working-directory: infra/providers/aws/terraform/environments/dev
        run: terraform init -backend=false -input=false
      - name: Terraform validate
        working-directory: infra/providers/aws/terraform/environments/dev
        run: terraform validate

  web-checks:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.web == 'true' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Lint web
        working-directory: apps/web
        run: npm run lint
      - name: Typecheck web
        working-directory: apps/web
        run: npm run typecheck
      - name: Build web
        working-directory: apps/web
        run: npm run build

  api-checks:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.api == 'true' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install api dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint api
        working-directory: apps/api
        run: ruff check app tests
      - name: Test api
        working-directory: apps/api
        run: pytest