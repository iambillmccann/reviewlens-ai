# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: deploy-dev

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS deployment region
        required: true
        default: us-east-2
        type: string
      tf_state_bucket:
        description: Terraform state bucket name
        required: true
        type: string
      tf_state_key:
        description: Terraform state object key
        required: true
        default: dev/terraform.tfstate
        type: string
      environment_name:
        description: Terraform environment name
        required: true
        default: dev
        type: string
      aws_role_to_assume:
        description: AWS role to assume for GitHub Actions
        required: true
        type: string
      force_backend_rebuild:
        description: Force backend image rebuild even if current commit SHA tag already exists in ECR
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  AWS_REGION: ${{ inputs.aws_region }}
  TF_STATE_BUCKET: ${{ inputs.tf_state_bucket }}
  TF_STATE_KEY: ${{ inputs.tf_state_key }}
  ENVIRONMENT_NAME: ${{ inputs.environment_name }}
  AWS_ROLE_TO_ASSUME: ${{ inputs.aws_role_to_assume }}
  FORCE_BACKEND_REBUILD: ${{ inputs.force_backend_rebuild }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate workflow inputs
        run: |
          missing=0

          for name in AWS_REGION TF_STATE_BUCKET TF_STATE_KEY ENVIRONMENT_NAME AWS_ROLE_TO_ASSUME FORCE_BACKEND_REBUILD; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required workflow input: $name" >&2
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Terraform init
        working-directory: infra/providers/aws/terraform/environments/dev
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY:-dev/terraform.tfstate}"

      - name: Resolve deployment targets
        id: infra
        working-directory: infra/providers/aws/terraform/environments/dev
        run: |
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "app_runner_service_arn=$(terraform output -raw app_runner_service_arn)" >> "$GITHUB_OUTPUT"
          echo "app_runner_service_url=$(terraform output -raw app_runner_service_url)" >> "$GITHUB_OUTPUT"
          echo "s3_bucket_name=$(terraform output -raw s3_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_domain_name=$(terraform output -raw cloudfront_domain_name)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$(cut -d/ -f1 <<< '${{ steps.infra.outputs.ecr_repository_url }}')"

      - name: Resolve backend image tag
        id: image
        run: |
          image_tag="sha-${GITHUB_SHA}"
          image_uri="${{ steps.infra.outputs.ecr_repository_url }}:${image_tag}"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${image_uri}" >> "$GITHUB_OUTPUT"

      - name: Check backend image existence
        id: image-check
        run: |
          if aws ecr describe-images \
            --repository-name "$(basename '${{ steps.infra.outputs.ecr_repository_url }}')" \
            --image-ids imageTag="${{ steps.image.outputs.image_tag }}" \
            --query 'imageDetails[0].imageDigest' \
            --output text >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push backend image
        if: ${{ env.FORCE_BACKEND_REBUILD == 'true' || steps.image-check.outputs.exists != 'true' }}
        run: |
          docker build -f apps/api/Dockerfile \
            -t "${{ steps.image.outputs.image_uri }}" \
            -t "${{ steps.infra.outputs.ecr_repository_url }}:latest" \
            .
          docker push "${{ steps.image.outputs.image_uri }}"
          docker push "${{ steps.infra.outputs.ecr_repository_url }}:latest"

      - name: Reuse existing backend image
        if: ${{ env.FORCE_BACKEND_REBUILD != 'true' && steps.image-check.outputs.exists == 'true' }}
        run: |
          echo "Reusing existing backend image ${{ steps.image.outputs.image_uri }}"

      - name: Ensure CORS origins include frontend domain
        run: |
          param_name="/reviewlens-ai-${ENVIRONMENT_NAME}/cors_origins"
          frontend_origin="https://${{ steps.infra.outputs.cloudfront_domain_name }}"
          current_origins=$(aws ssm get-parameter \
            --name "${param_name}" \
            --query 'Parameter.Value' \
            --output text 2>/dev/null || true)

          if [[ -z "${current_origins}" ]]; then
            next_origins="${frontend_origin}"
          elif [[ ",${current_origins}," == *",${frontend_origin},"* ]]; then
            next_origins="${current_origins}"
          else
            next_origins="${current_origins},${frontend_origin}"
          fi

          aws ssm put-parameter \
            --name "${param_name}" \
            --type String \
            --value "${next_origins}" \
            --overwrite >/dev/null

          echo "Using CORS origins: ${next_origins}"

      - name: Ensure App Runner service is RUNNING
        run: |
          service_arn="${{ steps.infra.outputs.app_runner_service_arn }}"

          current_status=$(aws apprunner describe-service \
            --service-arn "$service_arn" \
            --query 'Service.Status' \
            --output text)

          echo "App Runner current status: ${current_status}"

          if [[ "$current_status" == "PAUSED" ]]; then
            echo "Resuming paused App Runner service..."
            resume_operation_id=$(aws apprunner resume-service \
              --service-arn "$service_arn" \
              --query 'OperationId' \
              --output text)

            for attempt in $(seq 1 60); do
              op_status=$(aws apprunner list-operations \
                --service-arn "$service_arn" \
                --query "OperationSummaryList[?Id=='${resume_operation_id}']|[0].Status" \
                --output text)

              if [[ "$op_status" == "SUCCEEDED" ]]; then
                break
              fi

              if [[ "$op_status" == "FAILED" || "$op_status" == "ROLLBACK_FAILED" ]]; then
                echo "Resume operation failed with status: $op_status" >&2
                exit 1
              fi

              sleep 10
            done
          fi

          for attempt in $(seq 1 60); do
            service_status=$(aws apprunner describe-service \
              --service-arn "$service_arn" \
              --query 'Service.Status' \
              --output text)

            if [[ "$service_status" == "RUNNING" ]]; then
              exit 0
            fi

            if [[ "$service_status" == "CREATE_FAILED" || "$service_status" == "DELETE_FAILED" ]]; then
              echo "App Runner service entered terminal failure state: $service_status" >&2
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for App Runner service to become RUNNING" >&2
          exit 1

      - name: Start App Runner deployment
        id: apprunner
        run: |
          operation_id=$(aws apprunner start-deployment \
            --service-arn "${{ steps.infra.outputs.app_runner_service_arn }}" \
            --query 'OperationId' \
            --output text)
          echo "operation_id=${operation_id}" >> "$GITHUB_OUTPUT"

      - name: Wait for App Runner deployment
        run: |
          for attempt in $(seq 1 60); do
            status=$(aws apprunner list-operations \
              --service-arn "${{ steps.infra.outputs.app_runner_service_arn }}" \
              --query "OperationSummaryList[?Id=='${{ steps.apprunner.outputs.operation_id }}']|[0].Status" \
              --output text)

            if [[ "$status" == "SUCCEEDED" ]]; then
              exit 0
            fi

            if [[ "$status" == "FAILED" || "$status" == "ROLLBACK_FAILED" || "$status" == "ROLLBACK_SUCCEEDED" ]]; then
              echo "App Runner deployment failed with status: $status" >&2
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for App Runner deployment" >&2
          exit 1

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build frontend
        working-directory: apps/web
        env:
          VITE_API_BASE_URL: https://${{ steps.infra.outputs.app_runner_service_url }}
        run: npm run build

      - name: Publish frontend assets
        run: |
          aws s3 sync apps/web/dist "s3://${{ steps.infra.outputs.s3_bucket_name }}" --delete
          invalidation_id=$(aws cloudfront create-invalidation \
            --distribution-id "${{ steps.infra.outputs.cloudfront_distribution_id }}" \
            --paths '/*' \
            --query 'Invalidation.Id' \
            --output text)
          echo "invalidation_id=${invalidation_id}" >> "$GITHUB_ENV"

      - name: Wait for CloudFront invalidation
        run: |
          for attempt in $(seq 1 30); do
            status=$(aws cloudfront get-invalidation \
              --distribution-id "${{ steps.infra.outputs.cloudfront_distribution_id }}" \
              --id "$invalidation_id" \
              --query 'Invalidation.Status' \
              --output text)

            if [[ "$status" == "Completed" ]]; then
              exit 0
            fi

            sleep 10
          done

          echo "Timed out waiting for CloudFront invalidation" >&2
          exit 1

      - name: Smoke test deployment
        run: |
          frontend_url="https://${{ steps.infra.outputs.cloudfront_domain_name }}"
          api_base_url="https://${{ steps.infra.outputs.app_runner_service_url }}"

          # Frontend reachable: must return HTTP 200.
          [[ "$(curl -fsS -o /dev/null -w '%{http_code}' "${frontend_url}/")" == "200" ]]

          # API health/readiness/version checks.
          curl -fsS "${api_base_url}/api/v1/health" | grep -q '"status":"ok"'
          curl -fsS "${api_base_url}/api/v1/ready" | grep -q '"status":"ready"'
          curl -fsS "${api_base_url}/api/v1/version" | grep -qi 'reviewlens-ai-api'

          # CORS check: API should emit access-control-allow-origin for frontend origin.
          cors_headers=$(mktemp)
          curl -fsS -D "${cors_headers}" -o /dev/null \
            -H "Origin: ${frontend_url}" \
            "${api_base_url}/api/v1/health"
          grep -qi '^access-control-allow-origin:' "${cors_headers}"

      - name: Summarize deployment
        run: |
          echo "## deploy-dev" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: https://${{ steps.infra.outputs.cloudfront_domain_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend: https://${{ steps.infra.outputs.app_runner_service_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend image tag: ${{ steps.image.outputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ env.FORCE_BACKEND_REBUILD }}" == "true" ]]; then
            echo "- Backend image action: forced rebuild" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.image-check.outputs.exists }}" == "true" ]]; then
            echo "- Backend image action: reused existing SHA-tagged image" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Backend image action: built and pushed new SHA-tagged image" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Note: database migrations are not run from GitHub Actions yet because the current RDS instance is private to the VPC." >> "$GITHUB_STEP_SUMMARY"