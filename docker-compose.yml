services:
  db:
    image: postgres:16
    container_name: reviewlens-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reviewlens-ai
    ports:
      - "5432:5432"
    volumes:
      - reviewlens-ai_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reviewlens-ai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  reviewlens-ai_db_data: